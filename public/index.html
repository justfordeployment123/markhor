<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/logo192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="%PUBLIC_URL%/logo512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <base href="/" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Markhor Systems - We build exceptional mobile apps, web applications, and AI solutions that drive business growth."
    />
    <meta name="keywords" content="mobile app development, web development, AI development, software agency, React Native, Flutter, machine learning" />
    <meta name="author" content="Markhor Systems" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Markhor Systems - Mobile, Web & AI Development" />
    <meta property="og:description" content="We build exceptional digital products that drive business growth. From mobile apps to AI solutions." />
    <meta property="og:site_name" content="Markhor Systems" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Markhor Systems - Mobile, Web & AI Development" />
    <meta name="twitter:description" content="We build exceptional digital products that drive business growth." />
    
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <title>Markhor Systems | Mobile, Web & AI Development Agency</title>
    
    <style>
      /* Custom font smoothing */
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
      }
      
      /* Hide scrollbar for Chrome, Safari and Opera */
      ::-webkit-scrollbar {
        width: 8px;
      }
      
      ::-webkit-scrollbar-track {
        background: #f5f5f5;
      }
      
      ::-webkit-scrollbar-thumb {
        background: #a3a3a3;
        border-radius: 9999px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: #737373;
      }
      
      /* Float animation for hero elements */
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
      }
      
      /* Fade in up animation */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
